<!DOCTYPE html>
<html>
<head>
  <title>Deepwoken Calculator</title>

  <link href="https://fonts.googleapis.com/css2?family=Fondamento&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Fondamento', cursive;
      background: #0f1a14;
      color: white;
      margin: 0;

      /* CENTER EVERYTHING */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .wrapper {
      text-align: center;
      width: 100%;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    .box {
      background: #1e2d24;
      border-radius: 20px;
      padding: 20px;
      width: 300px;
      box-shadow: 0 0 15px rgba(0,255,150,0.1);
    }

    .label {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .slot {
      border: 2px dashed #3a5a4a;
      border-radius: 12px;
      margin: 8px;
      padding: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slot:hover {
      background: rgba(0,255,150,0.05);
    }

    button {
      margin: 10px;
      padding: 6px 12px;
      border-radius: 10px;
      border: none;
      background: #2ecc71;
      color: black;
      cursor: pointer;
      font-family: 'Fondamento', cursive;
    }

    img {
      width: 45px;
      height: 45px;
      object-fit: contain;
    }

    #result {
      margin-top: 20px;
      font-size: 28px;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: #1e2d24;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #3a5a4a;
      max-width: 400px;
    }

    .item {
      display: inline-block;
      margin: 10px;
      cursor: pointer;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="wrapper">

<h1>Trade Calculator</h1>

<div class="container">

  <div class="box">
    <div class="label">You</div>
    <button onclick="addSlot('your')">+</button>
    <div id="yourSlots"></div>
    <p>Total: <span id="yourTotal">0</span></p>
  </div>

  <div class="box">
    <div class="label">Them</div>
    <button onclick="addSlot('their')">+</button>
    <div id="theirSlots"></div>
    <p>Total: <span id="theirTotal">0</span></p>
  </div>

</div>

<h2 id="result">Fair</h2>

</div>

<div id="popup" class="popup"></div>

<script>
const relics = [
  {name:"Idol", value:1, img:""},
  {name:"Moonseye Tome", value:4, img:""},
  {name:"Sinner's Ash", value:5.25, img:""},
  {name:"Armorer's Needle", value:0.25, img:""},
  {name:"Dormant Splinter", value:15.75, img:""},
  {name:"Bloodfouler", value:8.5, img:""},
  {name:"Ysley's Pyres Keeper", value:0.15, img:""},
  {name:"Stormseye", value:0.10, img:""},
  {name:"Ignition Deepcrusher", value:0.10, img:""},
  {name:"Railblade", value:0.5, img:""}
];

let currentSlot = null;
let currentSide = null;
let your = [];
let their = [];

function addSlot(side){
  let slot = document.createElement("div");
  slot.className = "slot";

  slot.onclick = () => openPopup(side, slot);

  document.getElementById(side+"Slots").appendChild(slot);

  openPopup(side, slot);
}

function openPopup(side, slot){
  currentSlot = slot;
  currentSide = side;

  let popup = document.getElementById("popup");
  popup.innerHTML = "";

  relics.forEach(r => {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${r.img ? `<img src="${r.img}" onerror="this.style.display='none'">` : ""}
      <br>${r.name}
    `;

    div.onclick = () => selectRelic(r);

    popup.appendChild(div);
  });

  popup.style.display = "block";
}

function selectRelic(relic){
  currentSlot.innerHTML = `
    ${relic.img ? `<img src="${relic.img}" onerror="this.style.display='none'">` : ""}
    <br>${relic.name}
  `;

  currentSlot.onclick = () => removeRelic(currentSlot, relic.value, currentSide);

  if(currentSide==="your") your.push(relic.value);
  else their.push(relic.value);

  document.getElementById("popup").style.display = "none";

  update();
}

function removeRelic(slot, value, side){
  slot.remove();

  if(side==="your"){
    your.splice(your.indexOf(value),1);
  } else {
    their.splice(their.indexOf(value),1);
  }

  update();
}

function update(){
  let yourTotal = your.reduce((a,b)=>a+b,0);
  let theirTotal = their.reduce((a,b)=>a+b,0);

  document.getElementById("yourTotal").innerText = yourTotal.toFixed(2);
  document.getElementById("theirTotal").innerText = theirTotal.toFixed(2);

  let res = "Fair";

  if(theirTotal > yourTotal){
    res = "WIN +" + (theirTotal - yourTotal).toFixed(2);
    document.getElementById("result").style.color = "#2ecc71";
  }
  else if(yourTotal > theirTotal){
    res = "LOSE -" + (yourTotal - theirTotal).toFixed(2);
    document.getElementById("result").style.color = "#ff4d4d";
  }
  else{
    res = "Fair";
    document.getElementById("result").style.color = "white";
  }

  document.getElementById("result").innerText = res;
}
</script>

</body>
</html>
