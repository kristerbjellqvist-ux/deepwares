<!DOCTYPE html>
<html>
<head>
<title>Trade Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Fondamento&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Fondamento', cursive;
  background:#0f1a14;
  color:white;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transform: scale(0.9); /* SMALLER */
}

.wrapper {
  text-align:center;
  width:850px;
  border:2px solid #4f7a65; /* THICKER */
  padding:15px;
  border-radius:15px;
}

.container {
  display:flex;
  justify-content:center;
  gap:30px;
}

.box {
  background:#1e2d24;
  border-radius:20px;
  padding:15px;
  width:280px;
  border:2px solid #4f7a65; /* THICKER */
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.slot {
  border:2px dashed #4f7a65;
  border-radius:10px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:11px;
  text-align:center;
}

.plus { font-size:24px; opacity:0.6; }

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#1e2d24;
  padding:20px;
  border-radius:15px;
  width:360px;
  border:2px solid #4f7a65;
}

/* GRID INSIDE POPUP */
#itemList {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  max-height:260px; /* 9 ITEMS */
  overflow-y:auto; /* SCROLL INSIDE */
}

.item {
  border-radius:10px;
  padding:8px;
  cursor:pointer;
  border:2px solid #4f7a65;
  font-size:11px;
  text-align:center;
}

/* RELIC BG */
.relic {
  background: linear-gradient(90deg, #2ecc71, #a8ffcb, #2ecc71);
  background-size:200%;
  animation:shine 3s linear infinite;
}

/* WEAPON BG */
.weapon {
  background:#5e3a9e;
}

.value {
  font-size:10px;
  opacity:0.9;
}

/* SEARCH */
input {
  width:90%;
  padding:6px;
  margin-bottom:10px;
  border-radius:8px;
  border:2px solid #4f7a65;
  background:#1b3328;
  color:white;
  font-family:'Fondamento',cursive;
}

/* BAR */
.bar-container {
  width:100%;
  height:18px;
  background:#222;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
  border:2px solid #4f7a65;
}

.bar {
  height:100%;
  width:50%;
  background:#2ecc71;
  transition:0.3s;
}

#flavor {
  margin-top:8px;
  font-style:italic;
  color:#ccc;
}

@keyframes shine {
  0% {background-position:0%;}
  100% {background-position:200%;}
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Trade Calculator</h1>

<div class="container">

<div class="box">
<h2>You</h2>
<div id="yourGrid" class="grid"></div>
<p>Total: <span id="yourTotal">0</span></p>
</div>

<div class="box">
<h2>Them</h2>
<div id="theirGrid" class="grid"></div>
<p>Total: <span id="theirTotal">0</span></p>
</div>

</div>

<h2 id="result">Fair</h2>

<div class="bar-container">
  <div id="bar" class="bar"></div>
</div>

<div id="flavor"></div>

</div>

<div id="popup" class="popup"></div>

<script>
let relics = [
{name:"Whistling Peraipt", value:157.5, type:"Relic"},
{name:"Bloodforged Crown", value:52.5, type:"Relic"},
{name:"Dormant Splinter", value:15.75, type:"Weapon"},
{name:"Bloodfouler", value:8.5, type:"Weapon"},
{name:"Sinner's Ash", value:5.25, type:"Relic"},
{name:"Moonseye Tome", value:4, type:"Relic"},
{name:"Idol of Yun'Shul", value:1, type:"Relic"},
{name:"Kyrswinter", value:0.85, type:"Weapon"},
{name:"Gilded Needle", value:0.8, type:"Relic"},
{name:"Railblade", value:0.5, type:"Weapon"},
{name:"Forge Needle", value:0.5, type:"Relic"},
{name:"Flareblood Kamas", value:0.2, type:"Weapon"},
{name:"Smith's Alloy", value:0.1, type:"Relic"},
{name:"Stormseye", value:0.10, type:"Weapon"},
{name:"Ignition Deepcrusher", value:0.10, type:"Weapon"},
{name:"Curved Blade of Winds", value:0.05, type:"Weapon"},
{name:"Crypt Blade", value:0.02, type:"Weapon"},
{name:"Gran Sudaruska", value:0.02, type:"Weapon"},
{name:"Armorer's Needle", value:0.25, type:"Relic"},
{name:"Ysley's Pyres Keeper", value:0.15, type:"Weapon"}
];

let your = Array(9).fill(null);
let their = Array(9).fill(null);

let currentSide, currentIndex;

const winMsgs = ["You better accept that!","Too good to be true!","Lucky day!","Saved you a ethiron run!","I thought they said they removed Luck!"];
const fairMsgs = ["Seems good!","Nice deal, make sure to look at the demand!","Nothing like a chill fair offer.","Seems legit.","Ferryman's level of kindness!"];
const loseMsgs = ["Are you sure about this?","Wouldn't take that to be honest.","Sketchy...","Are you that desperate?","Better pay off..","You need it for a build??","Calm down!","Noone's stopping you..","Value manipulation they say!","Are you insane?"];

function createGrid(side){
  let grid = document.getElementById(side+"Grid");
  for(let i=0;i<9;i++){
    let slot=document.createElement("div");
    slot.className="slot";
    slot.onclick=()=>handleClick(side,i);
    grid.appendChild(slot);
  }
  renderGrid(side);
}

function handleClick(side,index){
  let arr = side==="your"?your:their;

  if(arr[index]){
    arr[index]=null;
    renderGrid(side);
    update();
  } else if(index === arr.findIndex(x=>x===null)){
    openPopup(side,index);
  }
}

function renderGrid(side){
  let grid=document.getElementById(side+"Grid");
  let arr=side==="your"?your:their;

  [...grid.children].forEach((slot,i)=>{
    if(arr[i]){
      slot.innerHTML=`<div class="${arr[i].type==='Relic'?'relic':'weapon'}">${arr[i].name}</div>`;
    } else if(i===arr.findIndex(x=>x===null)){
      slot.innerHTML=`<div class="plus">+</div>`;
    } else {
      slot.innerHTML="";
    }
  });
}

function openPopup(side,index){
  currentSide=side;
  currentIndex=index;

  let popup=document.getElementById("popup");
  popup.innerHTML=`
    <input placeholder="Search..." oninput="searchItems(this.value)">
    <div id="itemList"></div>
  `;

  renderItems(relics);
  popup.style.display="block";
}

function renderItems(list){
  let container=document.getElementById("itemList");
  container.innerHTML="";

  list.forEach(r=>{
    let div=document.createElement("div");
    div.className="item "+(r.type==="Relic"?"relic":"weapon");
    div.innerHTML=`
      <div>${r.name}</div>
      <div class="value">${r.value} • ${r.type}</div>
    `;
    div.onclick=()=>selectItem(r);
    container.appendChild(div);
  });
}

function searchItems(q){
  let filtered=relics.filter(r=>r.name.toLowerCase().includes(q.toLowerCase()));
  renderItems(filtered);
}

function selectItem(item){
  let arr=currentSide==="your"?your:their;
  arr[currentIndex]=item;

  document.getElementById("popup").style.display="none";

  renderGrid(currentSide);
  update();
}

function update(){
  let yourTotal=your.reduce((a,b)=>a+(b?b.value:0),0);
  let theirTotal=their.reduce((a,b)=>a+(b?b.value:0),0);

  document.getElementById("yourTotal").innerText=yourTotal.toFixed(2);
  document.getElementById("theirTotal").innerText=theirTotal.toFixed(2);

  let diff=theirTotal-yourTotal;
  let result=document.getElementById("result");

  let flavor="";

  if(diff>0){
    result.innerText="WIN +"+diff.toFixed(2);
    result.style.color="#2ecc71";
    flavor=winMsgs[Math.floor(Math.random()*winMsgs.length)];
  } else if(diff<0){
    result.innerText="LOSE -"+Math.abs(diff).toFixed(2);
    result.style.color="#ff4d4d";
    flavor=loseMsgs[Math.floor(Math.random()*loseMsgs.length)];
  } else {
    result.innerText="Fair";
    result.style.color="white";
    flavor=fairMsgs[Math.floor(Math.random()*fairMsgs.length)];
  }

  document.getElementById("flavor").innerText=flavor;

  let total=yourTotal+theirTotal;
  let percent= total===0?50:(theirTotal/total)*100;

  document.getElementById("bar").style.width=percent+"%";
}

createGrid("your");
createGrid("their");
</script>

</body>
</html>
