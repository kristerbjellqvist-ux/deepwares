<!DOCTYPE html>
<html>
<head>
<title>Trade Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Fondamento&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Fondamento', cursive;
  background:#0f1a14;
  color:white;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transform: scale(0.9);
}

.wrapper {
  text-align:center;
  width:850px;
  border:2px solid #4f7a65;
  padding:15px;
  border-radius:15px;
}

.container {
  display:flex;
  justify-content:center;
  gap:30px;
}

.box {
  background:#1e2d24;
  border-radius:20px;
  padding:15px;
  width:280px;
  border:2px solid #4f7a65;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.slot {
  border:2px dashed #4f7a65;
  border-radius:10px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:11px;
  text-align:center;
}

.plus { font-size:24px; opacity:0.6; }

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#1e2d24;
  padding:20px;
  border-radius:15px;
  width:360px;
  border:2px solid #4f7a65;
}

/* GRID INSIDE POPUP */
#itemList {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  max-height:260px;
  overflow-y:auto;
}

.item {
  border-radius:10px;
  padding:8px;
  cursor:pointer;
  border:2px solid #4f7a65;
  font-size:11px;
  text-align:center;
}

/* RELIC BG */
.relic {
  background: linear-gradient(90deg, #2ecc71, #a8ffcb, #2ecc71);
  background-size:200%;
  animation:shine 3s linear infinite;
}

/* WEAPON BG */
.weapon {
  background:#5e3a9e;
}

.value {
  font-size:10px;
  opacity:0.9;
}

/* SEARCH */
input {
  width:90%;
  padding:6px;
  margin-bottom:10px;
  border-radius:8px;
  border:2px solid #4f7a65;
  background:#1b3328;
  color:white;
  font-family:'Fondamento',cursive;
}

/* BAR */
.bar-container {
  width:100%;
  height:18px;
  background:#222;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
  border:2px solid #4f7a65;
}

.bar {
  height:100%;
  width:50%;
  background:#2ecc71;
  transition:0.3s;
}

#flavor {
  margin-top:8px;
  font-style:italic;
  color:#ccc;
}

@keyframes shine {
  0% {background-position:0%;}
  100% {background-position:200%;}
}

/* SCROLLBAR THEME */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #0f1a14;
}

::-webkit-scrollbar-thumb {
  background: #2ecc71;
  border-radius: 10px;
  border: 2px solid #0f1a14;
}

::-webkit-scrollbar-thumb:hover {
  background: #3cff8f;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Trade Calculator</h1>

<div class="container">

<div class="box">
<h2>You</h2>
<div id="yourGrid" class="grid"></div>
<p>Total: <span id="yourTotal">0</span></p>
</div>

<div class="box">
<h2>Them</h2>
<div id="theirGrid" class="grid"></div>
<p>Total: <span id="theirTotal">0</span></p>
</div>

</div>

<h2 id="result">Fair</h2>

<div class="bar-container">
  <div id="bar" class="bar"></div>
</div>

<div id="flavor"></div>

</div>

<div id="popup" class="popup"></div>
