<!DOCTYPE html>
<html>
<head>
  <title>Deepwoken Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f1a14;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
    }

    .box {
      background: #1e2d24;
      border-radius: 20px;
      padding: 20px;
      width: 40%;
      box-shadow: 0 0 15px rgba(0,255,150,0.1);
    }

    .label {
      font-size: 20px;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .slot {
      border: 2px dashed #3a5a4a;
      border-radius: 12px;
      margin: 8px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slot:hover {
      background: rgba(0,255,150,0.05);
    }

    button {
      margin: 10px;
      padding: 6px 12px;
      border-radius: 10px;
      border: none;
      background: #2ecc71;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    img {
      width: 40px;
      height: 40px;
    }

    #result {
      margin-top: 30px;
      font-size: 28px;
      font-weight: bold;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: #1e2d24;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #3a5a4a;
    }

    .item {
      display: inline-block;
      margin: 10px;
      cursor: pointer;
      text-align: center;
    }

    .item:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>Trade Calculator</h1>

<div class="container">

  <div class="box">
    <div class="label">You</div>
    <button onclick="addSlot('your')">+</button>
    <div id="yourSlots"></div>
    <p>Total: <span id="yourTotal">0</span></p>
  </div>

  <div class="box">
    <div class="label">Them</div>
    <button onclick="addSlot('their')">+</button>
    <div id="theirSlots"></div>
    <p>Total: <span id="theirTotal">0</span></p>
  </div>

</div>

<h2 id="result">Fair</h2>

<div id="popup" class="popup"></div>

<script>
const relics = [
  {name:"Idol", value:100, img:"https://via.placeholder.com/50"},
  {name:"Railblade", value:250, img:"https://via.placeholder.com/50"},
  {name:"Enchant", value:400, img:"https://via.placeholder.com/50"}
];

let currentSlot = null;
let currentSide = null;
let your = [];
let their = [];

function addSlot(side){
  let slot = document.createElement("div");
  slot.className = "slot";
  slot.innerText = "Click to choose relic";

  slot.onclick = () => openPopup(side, slot);

  document.getElementById(side+"Slots").appendChild(slot);
}

function openPopup(side, slot){
  currentSlot = slot;
  currentSide = side;

  let popup = document.getElementById("popup");
  popup.innerHTML = "";

  relics.forEach(r => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<img src="${r.img}"><br>${r.name}`;

    div.onclick = () => selectRelic(r);

    popup.appendChild(div);
  });

  popup.style.display = "block";
}

function selectRelic(relic){
  currentSlot.innerHTML = `<img src="${relic.img}"> ${relic.name} (${relic.value})`;

  if(currentSide==="your") your.push(relic.value);
  else their.push(relic.value);

  document.getElementById("popup").style.display = "none";

  update();
}

function update(){
  let yourTotal = your.reduce((a,b)=>a+b,0);
  let theirTotal = their.reduce((a,b)=>a+b,0);

  document.getElementById("yourTotal").innerText = yourTotal;
  document.getElementById("theirTotal").innerText = theirTotal;

  let res = "Fair";

  if(theirTotal > yourTotal){
    res = "WIN +" + (theirTotal - yourTotal);
    document.getElementById("result").style.color = "#2ecc71";
  }
  else if(yourTotal > theirTotal){
    res = "LOSE -" + (yourTotal - theirTotal);
    document.getElementById("result").style.color = "#ff4d4d";
  }
  else{
    res = "Fair";
    document.getElementById("result").style.color = "white";
  }

  document.getElementById("result").innerText = res;
}
</script>

</body>
</html>
